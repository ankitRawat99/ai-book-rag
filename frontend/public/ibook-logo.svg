<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="book-grad-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="book-grad-right" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="book-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#090e17"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Premium Dark Rounded Background -->
  <rect width="100" height="100" rx="22" fill="url(#book-bg)"/>
  <rect width="100" height="100" rx="22" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  
  <!-- Left Page Block -->
  <path d="M22 34 C 22 34, 35 28, 50 38 L 50 74 C 35 64, 22 70, 22 70 Z" fill="url(#book-grad-left)" filter="url(#glow)"/>
  
  <!-- Right Page Block -->
  <path d="M78 34 C 78 34, 65 28, 50 38 L 50 74 C 65 64, 78 70, 78 70 Z" fill="url(#book-grad-right)" filter="url(#glow)"/>
  
  <!-- Subtle inner pages -->
  <path d="M25 42 C 35 37, 45 42, 50 45" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M75 42 C 65 37, 55 42, 50 45" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M25 50 C 35 45, 45 50, 50 53" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M75 50 C 65 45, 55 50, 50 53" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Center Fold / Spine Highlight -->
  <line x1="50" y1="36" x2="50" y2="76" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Sparkle Star at top -->
  <path d="M50 14 L52.5 22 L60.5 24.5 L52.5 27 L50 35 L47.5 27 L39.5 24.5 L47.5 22 Z" fill="#ffffff" opacity="0.9" filter="url(#glow)"/>
</svg>
